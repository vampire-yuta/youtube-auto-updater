<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Auto Uploader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #16213e;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
        }
        input[type="file"] { padding: 0.5rem; }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c73650; }
        button:disabled { background: #666; cursor: not-allowed; }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
        }
        .success {
            background: #1b4332;
            border: 1px solid #2d6a4f;
        }
        .success a { color: #95d5b2; }
        .error {
            background: #3d0000;
            border: 1px solid #6b0000;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Auto Uploader</h1>

        <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">
            <label for="title">タイトル</label>
            <input type="text" id="title" name="title" required placeholder="動画のタイトル">

            <label for="thumbnail_text">サムネイル文字</label>
            <input type="text" id="thumbnail_text" name="thumbnail_text" required placeholder="サムネに表示するテキスト">

            <label for="video">動画ファイル</label>
            <input type="file" id="video" name="video" accept="video/mp4" required>

            <button type="submit" id="submitBtn">アップロード</button>
        </form>

        <div class="loading" id="loading">処理中... しばらくお待ちください</div>

        {% if success %}
        <div class="message success">
            アップロード完了: <strong>{{ title }}</strong><br>
            <a href="{{ youtube_url }}" target="_blank">{{ youtube_url }}</a>
        </div>
        {% endif %}

        {% if error %}
        <div class="message error">
            エラー: {{ error }}
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", function() {
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("loading").style.display = "block";
        });
    </script>
</body>
</html>
