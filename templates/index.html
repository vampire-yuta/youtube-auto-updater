<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Auto Uploader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #16213e;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        select, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
        }
        input[type="file"] { padding: 0.5rem; }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c73650; }
        button:disabled { background: #666; cursor: not-allowed; }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
        }
        .success {
            background: #1b4332;
            border: 1px solid #2d6a4f;
        }
        .success a { color: #95d5b2; }
        .error {
            background: #3d0000;
            border: 1px solid #6b0000;
        }
        #progress {
            display: none;
            margin-top: 1.5rem;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 0;
            font-size: 0.95rem;
            color: #666;
        }
        .step.active { color: #eee; }
        .step.done { color: #95d5b2; }
        .step.error { color: #e94560; }
        .step-icon {
            width: 1.2rem;
            text-align: center;
            flex-shrink: 0;
        }
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #444;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Auto Uploader</h1>

        <form id="uploadForm">
            <label for="title">タイトル</label>
            <input type="text" id="title" name="title" required placeholder="動画のタイトル">

            <label for="thumbnail_text">サムネイル文字</label>
            <input type="text" id="thumbnail_text" name="thumbnail_text" required placeholder="サムネに表示するテキスト">

            <label for="publish_timing">公開タイミング</label>
            <select id="publish_timing" name="publish_timing">
                <option value="now">すぐ公開</option>
                <option value="1hour" selected>1時間後</option>
                <option value="2hour">2時間後</option>
                <option value="tomorrow_18">明日の18時</option>
            </select>

            <label for="video">動画ファイル</label>
            <input type="file" id="video" name="video" accept="video/mp4" required>

            <button type="submit" id="submitBtn">アップロード</button>
        </form>

        <div id="progress">
            <div class="step" id="step-receive">
                <span class="step-icon" id="icon-receive">-</span>
                <span>動画送信 <span id="receive-pct"></span></span>
            </div>
            <div class="step" id="step-bgm">
                <span class="step-icon" id="icon-bgm">-</span>
                <span>BGM合成</span>
            </div>
            <div class="step" id="step-thumbnail">
                <span class="step-icon" id="icon-thumbnail">-</span>
                <span>サムネイル生成</span>
            </div>
            <div class="step" id="step-auth">
                <span class="step-icon" id="icon-auth">-</span>
                <span>YouTube認証</span>
            </div>
            <div class="step" id="step-upload">
                <span class="step-icon" id="icon-upload">-</span>
                <span>YouTubeアップロード</span>
            </div>
            <div class="step" id="step-thumbnail_set">
                <span class="step-icon" id="icon-thumbnail_set">-</span>
                <span>サムネイル設定</span>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById("uploadForm");
        const submitBtn = document.getElementById("submitBtn");
        const progressDiv = document.getElementById("progress");
        const resultDiv = document.getElementById("result");

        function setStep(step, status) {
            const el = document.getElementById("step-" + step);
            const icon = document.getElementById("icon-" + step);
            if (!el || !icon) return;

            el.className = "step";
            if (status === "running") {
                el.classList.add("active");
                icon.innerHTML = '<span class="spinner"></span>';
            } else if (status === "done") {
                el.classList.add("done");
                icon.textContent = "\u2713";
            } else if (status === "error") {
                el.classList.add("error");
                icon.textContent = "\u2717";
            }
        }

        form.addEventListener("submit", async function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            progressDiv.style.display = "block";
            resultDiv.innerHTML = "";

            // リセット
            ["receive","bgm","thumbnail","auth","upload","thumbnail_set"].forEach(s => {
                const el = document.getElementById("step-" + s);
                const icon = document.getElementById("icon-" + s);
                if (el) el.className = "step";
                if (icon) icon.textContent = "-";
            });

            const formData = new FormData(form);
            const pctEl = document.getElementById("receive-pct");

            setStep("receive", "running");
            pctEl.textContent = "0%";

            const xhr = new XMLHttpRequest();
            xhr.open("POST", "/upload");

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    pctEl.textContent = pct + "%";
                }
            };

            xhr.onload = function() {
                if (xhr.status !== 200) {
                    resultDiv.innerHTML = '<div class="message error">\u30a8\u30e9\u30fc: HTTP ' + xhr.status + '</div>';
                    submitBtn.disabled = false;
                    return;
                }

                const data = JSON.parse(xhr.responseText);
                setStep("receive", "done");
                pctEl.textContent = "";

                const evtSource = new EventSource("/progress/" + data.job_id);
                evtSource.onmessage = function(e) {
                    const event = JSON.parse(e.data);

                    if (event.step === "complete") {
                        evtSource.close();
                        resultDiv.innerHTML = '<div class="message success">' +
                            '\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u5b8c\u4e86<br>' +
                            '<a href="' + event.detail + '" target="_blank">' + event.detail + '</a></div>';
                        submitBtn.disabled = false;
                        return;
                    }

                    if (event.step === "error") {
                        evtSource.close();
                        resultDiv.innerHTML = '<div class="message error">\u30a8\u30e9\u30fc: ' + event.detail + '</div>';
                        submitBtn.disabled = false;
                        return;
                    }

                    setStep(event.step, event.status);
                };

                evtSource.onerror = function() {
                    evtSource.close();
                    submitBtn.disabled = false;
                };
            };

            xhr.onerror = function() {
                resultDiv.innerHTML = '<div class="message error">\u30a8\u30e9\u30fc: \u901a\u4fe1\u5931\u6557</div>';
                submitBtn.disabled = false;
            };

            xhr.send(formData);
        });
    </script>
</body>
</html>
